<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>TCM Clinic 前端接入示例</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 980px; margin: 24px auto; padding: 0 16px; }
    .row { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
    input, select, textarea, button { font-size: 14px; padding: 8px; }
    input, textarea { flex: 1; min-width: 240px; }
    textarea { min-height: 80px; }
    #chatLog { border: 1px solid #ddd; border-radius: 8px; padding: 12px; min-height: 280px; background: #fafafa; }
    .msg { margin: 8px 0; padding: 8px; border-radius: 6px; }
    .user { background: #e8f4ff; }
    .bot { background: #f2f8ea; }
    .meta { color: #666; font-size: 12px; }
  </style>
</head>
<body>
  <h1>TCM Clinic Web Demo</h1>
  <p>这是一个最小前端示例，可直接调用后端 <code>/chat</code> / <code>/cases</code> / <code>/export</code> 接口。</p>

  <div class="row">
    <label>Case ID：</label>
    <input id="caseId" placeholder="首次对话可留空，系统会自动创建" />
    <label>阶段：</label>
    <select id="stage">
      <option value="initial">initial</option>
      <option value="revisit">revisit</option>
    </select>
    <button id="loadCasesBtn">读取病例列表</button>
  </div>

  <div class="row">
    <textarea id="message" placeholder="请输入患者主诉，例如：最近夜里咳嗽、咽干、怕冷"></textarea>
  </div>

  <div class="row">
    <button id="sendBtn">发送问诊</button>
    <button id="exportPdfBtn">导出 PDF</button>
    <button id="exportDocxBtn">导出 DOCX</button>
  </div>

  <div id="chatLog"></div>

  <script src="/web/main.js"></script>
</body>
</html>
